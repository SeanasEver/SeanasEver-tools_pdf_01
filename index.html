<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.9">
    <title>PDF拆分工具箱</title>
    
    <!-- 引入Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    
    <!-- 引入PDF处理库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <!-- 引入JSZip用于打包图片 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- 引入SortableJS用于拖拽排序 -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#10B981',
                        dark: '#1E293B',
                        light: '#F8FAFC',
                        accent: '#8B5CF6',
                        danger: '#EF4444',
                    },
                    fontFamily: {
                        inter: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    boxShadow: {
                        'card': '0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05)',
                        'hover': '0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04)',
                    }
                },
            },
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .scrollbar-hide {
                -ms-overflow-style: none;
                scrollbar-width: none;
            }
            .scrollbar-hide::-webkit-scrollbar {
                display: none;
            }
            .transition-all-300 {
                transition: all 300ms ease-in-out;
            }
            .scale-hover {
                @apply hover:scale-105 transition-all duration-300;
            }
            .card-shadow {
                @apply shadow-card hover:shadow-hover transition-all duration-300;
            }
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: #F8FAFC;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .page-thumbnail {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .page-thumbnail:hover {
            transform: translateY(-4px);
        }
        
        .checkbox-overlay {
            transition: all 0.2s ease;
        }
        
        /* 预览模态框样式 */
        .preview-modal {
            backdrop-filter: blur(8px);
        }
        
        .preview-wrapper {
            cursor: grab;
        }
        
        .preview-wrapper.dragging {
            cursor: grabbing;
        }
        
        #preview-image {
            transition: transform 0.2s ease;
            transform-origin: center center;
            user-select: none;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }
        
        /* 滚动条样式优化 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a1c1c1;
        }

        /* Toast 提示动画 */
        @keyframes fade-in-down {
            from {
                opacity: 0;
                transform: translate(-50%, -20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }
        .animate-fade-in-down {
            animation: fade-in-down 0.3s ease-out;
        }

        /* 导出格式单选按钮样式 - 蓝色主题（分页导出） */
        .format-radio:checked + label {
            background-color: #EFF6FF;
            border-color: #3B82F6;
            color: #1E40AF;
        }
        
        .format-radio:checked + label .check-icon {
            opacity: 1;
            transform: scale(1);
        }

        /* 导出格式单选按钮样式 - 绿色主题（自由合并） */
        .format-radio-green:checked + label {
            background-color: #ECFDF5;
            border-color: #10B981;
            color: #065F46;
        }
        
        .format-radio-green:checked + label .check-icon {
            opacity: 1;
            transform: scale(1);
        }

        /* 缩略图旋转过渡 */
        .thumbnail-img {
            transition: transform 0.3s ease;
        }

        /* 淡蓝色氛围光效 - 仅首次显示 */
        .first-show-glow {
            animation: glow-pulse 2s ease-in-out infinite;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.6), 0 0 30px rgba(59, 130, 246, 0.3), 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        @keyframes glow-pulse {
            0%, 100% {
                box-shadow: 0 0 15px rgba(59, 130, 246, 0.6), 0 0 30px rgba(59, 130, 246, 0.3);
            }
            50% {
                box-shadow: 0 0 25px rgba(59, 130, 246, 0.8), 0 0 50px rgba(59, 130, 246, 0.5);
            }
        }

        /* 主容器高度调整 - 为底部版权信息留出空间 */
        .main-container {
            height: calc(100vh - 106px);
        }
        
        /* 左侧预览区域高度调整 */
        .preview-container {
            height: calc(100vh - 126px);
        }
        
        /* 右侧设置面板高度调整 */
        .settings-panel {
            height: calc(100vh - 126px);
        }

        /* 缩略图大小调整 */
        :root {
            --thumbnail-scale: 1;
        }
        
        /* 网格布局响应式调整 - 使用CSS变量动态控制 */
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(calc(100px * var(--thumbnail-scale)), 1fr));
            gap: calc(0.5rem * var(--thumbnail-scale));
        }
        
        @media (min-width: 640px) {
            .preview-grid {
                grid-template-columns: repeat(auto-fill, minmax(calc(110px * var(--thumbnail-scale)), 1fr));
            }
        }
        
        @media (min-width: 1024px) {
            .preview-grid {
                grid-template-columns: repeat(auto-fill, minmax(calc(120px * var(--thumbnail-scale)), 1fr));
            }
        }

        /* 预览区域滚动容器 */
        .preview-scroll-area {
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* 拖拽排序相关样式 */
        .sortable-ghost {
            opacity: 0.4;
            background-color: #EFF6FF;
            border: 2px dashed #3B82F6 !important;
            transform: scale(0.95);
        }
        
        .sortable-drag {
            cursor: grabbing;
            opacity: 0.8;
            transform: scale(1.05) rotate(2deg);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
            z-index: 9999;
        }
        
        .sortable-handle {
            cursor: grab;
        }
        
        .sortable-handle:active {
            cursor: grabbing;
        }
        
        /* 拖拽时的卡片样式优化 */
        .page-thumbnail.sortable-ghost .thumbnail-img {
            opacity: 0.3;
        }
        
        .page-thumbnail.sortable-ghost input,
        .page-thumbnail.sortable-ghost .absolute {
            opacity: 0;
        }
    </style>
    
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
</head>
<body class="text-dark">

    <!-- 顶部导航 -->
    <header class="bg-white shadow-md sticky top-0 z-40 h-[70px] flex items-center shrink-0">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center w-full">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center text-white shadow-lg">
                    <i class="fa fa-file-pdf-o text-xl"></i>
                </div>
                <div>
                    <div class="flex items-center gap-2">
                        <h1 class="text-xl font-bold text-gray-800">PDF 拆分与合并工具</h1>
                        <!-- 小问号按钮 -->
                        <div class="relative inline-flex items-center">
                            <button id="privacyQuestionBtn" onmouseenter="showPrivacyTooltip()" onmouseleave="hidePrivacyTooltip()" class="relative w-5 h-5 bg-gradient-to-br from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white rounded-full text-[10px] flex items-center justify-center cursor-pointer z-50 shadow-md hover:shadow-lg transition-all duration-300 hover:scale-110 group">
                                <i class="fa fa-question transition-transform duration-300"></i>
                                
                                <!-- 提示框 - 位置改为小问号右侧，压缩高度 -->
                                <div id="privacy-tooltip" class="hidden absolute left-full top-[80%] transform -translate-y-1/2 ml-2 px-3 py-2 bg-white text-gray-700 text-xs rounded-lg shadow-lg border border-gray-100 w-79 leading-normal z-50">
                                    <div class="text-left whitespace-nowrap">
                                        <div>✦ 导入文件格式支持图片或pdf</div>
                                        <div>✦ 全过程离线处理，所有文件均不存储，请放心使用</div>
                                    </div>
                                </div>
                            </button>
                        </div>
                    </div>
                    <p class="text-xs text-gray-500">智能PDF页面管理与导出</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <!-- 一键清空按钮：有文件时显示 -->
                <button id="clearAllBtn" onclick="clearAllFiles()" class="hidden px-4 py-2 bg-danger hover:bg-red-600 text-white rounded-lg transition-colors text-sm font-medium flex items-center gap-2 shadow-lg shadow-red-500/30">
                    <i class="fa fa-trash-o"></i>
                    清空全部
                </button>
                
                <button onclick="document.getElementById('fileInput').click()" class="px-4 py-2 bg-primary hover:bg-blue-600 text-white rounded-lg transition-colors text-sm font-medium flex items-center gap-2 shadow-lg shadow-blue-500/30">
                    <i class="fa fa-cloud-upload"></i>
                    <span id="uploadBtnText">导入文件</span>
                </button>
            </div>
        </div>
    </header>

    <!-- 主要内容 -->
    <main class="container mx-auto px-4 py-4 main-container">
        <div class="flex flex-col lg:flex-row gap-5 h-full">
            
            <!-- 左侧：页面预览（宽栏，可滚动） -->
            <div class="lg:flex-[8] xl:flex-[9] h-full min-h-0">
                <div class="bg-white rounded-xl card-shadow h-full flex flex-col">
                    <div class="pt-2 pb-3 px-4 border-b border-gray-100 flex justify-between items-center shrink-0">
                        <h2 class="text-lg font-semibold flex items-center text-gray-800">
                            <i class="fa fa-th-large text-primary mr-2"></i>
                            页面预览
                            <span class="ml-2 text-xs text-gray-400 font-normal" id="dragHint">
                                <i class="fa fa-arrows ml-1"></i> 拖拽可调整顺序
                            </span>
                        </h2>
                        <div class="flex items-center gap-3 text-sm text-gray-500">
                            <!-- 缩略图大小调整 -->
                            <div class="flex items-center gap-1.5 bg-gray-100 rounded-lg p-1.5">
                                <button onclick="adjustThumbnailSize(-1)" class="w-8 h-8 flex items-center justify-center bg-white rounded-md shadow-sm hover:bg-blue-50 hover:text-blue-600 transition-all" title="缩小 - 每行显示更多">
                                    <i class="fa fa-compress text-xs"></i>
                                </button>
                                <span id="thumbnailSizeDisplay" class="text-xs font-medium text-gray-700 w-12 text-center">100%</span>
                                <button onclick="adjustThumbnailSize(1)" class="w-8 h-8 flex items-center justify-center bg-white rounded-md shadow-sm hover:bg-blue-50 hover:text-blue-600 transition-all" title="放大 - 每行显示更少">
                                    <i class="fa fa-expand text-xs"></i>
                                </button>
                            </div>
                            <span id="pageCountDisplay">共 0 页</span>
                        </div>
                    </div>
                    
                    <div class="flex-1 pt-2 pb-4 px-4 preview-scroll-area min-h-0">
                        <div id="previewGrid" class="preview-grid">
                            <div class="col-span-full flex flex-col items-center justify-center py-16 text-gray-400">
                                <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mb-4">
                                    <i class="fa fa-file-pdf-o text-3xl text-gray-300"></i>
                                </div>
                                <p class="text-base font-medium">暂无文件</p>
                                <p class="text-sm mt-1">请点击右上角上传文件开始处理</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧：拆分设置（窄栏，固定） -->
            <div class="lg:flex-[4] xl:flex-[3] h-full lg:sticky lg:top-[86px] shrink-0">
                <input type="file" id="fileInput" accept=".pdf,.png,.jpg,.jpeg,.webp,.gif" multiple class="hidden">

                <!-- 拆分设置 -->
                <div class="bg-white rounded-xl p-5 card-shadow h-full flex flex-col">
                    <h2 class="text-lg font-semibold mb-2 flex items-center text-gray-800">
                        <i class="fa fa-cog text-primary mr-2"></i>
                        拆分设置
                    </h2>
                    
                    <!-- 模式切换 -->
                    <div class="bg-gray-100 p-1 rounded-lg mb-3">
                        <div class="grid grid-cols-2 gap-1">
                            <button onclick="setMode('split')" id="mode-split" class="mode-btn active px-4 py-2 rounded-md text-sm font-medium transition-all bg-white text-primary shadow-sm">
                                <i class="fa fa-files-o mr-1.5"></i>分页导出
                            </button>
                            <button onclick="setMode('merge')" id="mode-merge" class="mode-btn px-4 py-2 rounded-md text-sm font-medium transition-all text-gray-500 hover:text-gray-700">
                                <i class="fa fa-object-group mr-1.5"></i>自由合并
                            </button>
                        </div>
                    </div>

                    <!-- 分页导出控制 -->
                    <div id="splitControls" class="space-y-3 flex-1 flex flex-col">
                        <div class="p-3 bg-blue-50 rounded-lg border border-blue-100">
                            <p class="text-sm text-blue-800 mb-1 font-medium">分页导出模式</p>
                            <p class="text-xs text-blue-600/80 leading-relaxed">将每个页面都拆分为单独文件导出。</p>
                        </div>

                        <div class="flex items-center p-3 bg-gray-50 rounded-lg">
                            <input type="checkbox" id="deleteAfterExportSplit" checked class="w-4 h-4 text-primary rounded border-gray-300 focus:ring-primary cursor-pointer">
                            <label for="deleteAfterExportSplit" class="ml-2 text-sm text-gray-600 cursor-pointer select-none">导出后删除原页面</label>
                        </div>

                        <!-- 导出格式选择 - 横向排列，默认勾选PDF -->
                        <div class="p-3 bg-gray-50 rounded-lg">
                            <label class="text-sm font-medium text-gray-700 block mb-2">导出格式</label>
                            <div class="grid grid-cols-3 gap-2">
                                <div class="relative">
                                    <input type="radio" name="exportFormat" id="format-pdf" value="pdf" class="format-radio hidden" checked>
                                    <label for="format-pdf" class="flex items-center justify-center p-2 bg-white border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-50 transition-all border-l-4 border-l-transparent hover:border-l-primary h-full text-center">
                                        <span class="text-xs text-gray-700 font-medium">PDF</span>
                                    </label>
                                </div>
                                <div class="relative">
                                    <input type="radio" name="exportFormat" id="format-png" value="png" class="format-radio hidden">
                                    <label for="format-png" class="flex items-center justify-center p-2 bg-white border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-50 transition-all border-l-4 border-l-transparent hover:border-l-primary h-full text-center">
                                        <span class="text-xs text-gray-700 font-medium">PNG</span>
                                    </label>
                                </div>
                                <div class="relative">
                                    <input type="radio" name="exportFormat" id="format-jpg" value="jpg" class="format-radio hidden">
                                    <label for="format-jpg" class="flex items-center justify-center p-2 bg-white border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-50 transition-all border-l-4 border-l-transparent hover:border-l-primary h-full text-center">
                                        <span class="text-xs text-gray-700 font-medium">JPG</span>
                                    </label>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mt-auto pt-2">
                            <button onclick="exportAllSplit()" class="w-full bg-primary hover:bg-blue-600 text-white font-medium py-2.5 px-4 rounded-lg shadow-lg shadow-blue-500/30 transition-all flex items-center justify-center gap-2 group">
                                <i class="fa fa-download group-hover:scale-110 transition-transform"></i>
                                全部导出为单页
                            </button>
                        </div>
                    </div>

                    <!-- 合并模式控制 -->
                    <div id="mergeControls" class="space-y-3 hidden flex-1 flex-col">
                        <div class="p-3 bg-green-50 rounded-lg border border-green-100">
                            <p class="text-sm text-green-800 mb-1 font-medium">自由合并模式</p>
                            <p class="text-xs text-green-600/80 leading-relaxed">选择需要的页面，合并为一个PDF文件。</p>
                        </div>
                        <div class="flex items-center p-3 bg-gray-50 rounded-lg">
                            <input type="checkbox" id="deleteAfterExport" checked class="w-4 h-4 text-secondary rounded border-gray-300 focus:ring-secondary cursor-pointer">
                            <label for="deleteAfterExport" class="ml-2 text-sm text-gray-600 cursor-pointer select-none">导出后删除原页面</label>
                        </div>
                        <!-- 导出格式选择 - 绿色主题，支持PDF、PNG、JPG -->
                        <div class="p-3 bg-gray-50 rounded-lg">
                            <label class="text-sm font-medium text-gray-700 block mb-2">导出格式</label>
                            <div class="grid grid-cols-3 gap-2">
                                <div class="relative">
                                    <input type="radio" name="exportFormatMerge" id="format-merge-pdf" value="pdf" class="format-radio-green hidden" checked>
                                    <label for="format-merge-pdf" class="flex items-center justify-center p-2 bg-white border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-50 transition-all border-l-4 border-l-transparent hover:border-l-secondary h-full text-center">
                                        <span class="text-xs text-gray-700 font-medium">PDF</span>
                                    </label>
                                </div>
                                <div class="relative">
                                    <input type="radio" name="exportFormatMerge" id="format-merge-png" value="png" class="format-radio-green hidden">
                                    <label for="format-merge-png" class="flex items-center justify-center p-2 bg-white border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-50 transition-all border-l-4 border-l-transparent hover:border-l-secondary h-full text-center">
                                        <span class="text-xs text-gray-700 font-medium">PNG</span>
                                    </label>
                                </div>
                                <div class="relative">
                                    <input type="radio" name="exportFormatMerge" id="format-merge-jpg" value="jpg" class="format-radio-green hidden">
                                    <label for="format-merge-jpg" class="flex items-center justify-center p-2 bg-white border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-50 transition-all border-l-4 border-l-transparent hover:border-l-secondary h-full text-center">
                                        <span class="text-xs text-gray-700 font-medium">JPG</span>
                                    </label>
                                </div>
                            </div>
                        </div>
                        <div class="mt-auto pt-2">
                            <button onclick="exportSelectedMerge()" class="w-full bg-secondary hover:bg-green-600 text-white font-medium py-2.5 px-4 rounded-lg shadow-lg shadow-green-500/30 transition-all flex items-center justify-center gap-2 group">
                                <i class="fa fa-download group-hover:scale-110 transition-transform"></i>
                                导出选中页面
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 版权信息 -->
    <footer class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-sm border-t border-gray-200 py-2 text-center text-xs text-gray-500 z-30">
        © 2026 PDF拆分工具箱 - Copyright by wangxch57
    </footer>

    <!-- 加载动画 - 统一为弹窗风格 -->
    <div id="loadingOverlay" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center">
        <div class="bg-white rounded-2xl p-8 w-full max-w-sm mx-4 shadow-2xl flex flex-col items-center">
            <div class="w-12 h-12 border-4 border-blue-100 border-t-primary rounded-full animate-spin mb-4"></div>
            <p class="text-gray-800 font-medium">处理中...</p>
            <p class="text-sm text-gray-500 mt-1">请稍候</p>
        </div>
    </div>

    <!-- 文件名确认弹窗 -->
    <div id="fileNameModal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center">
        <div class="bg-white rounded-2xl p-6 w-full max-w-md mx-4 shadow-2xl transform transition-all">
            <h3 class="text-xl font-bold text-gray-800 mb-2">确认导出文件名</h3>
            <p class="text-sm text-gray-500 mb-4" id="fileNameModalDesc">请输入合并后的PDF文件名</p>
            <input type="text" id="fileNameInput" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary mb-6" placeholder="请输入文件名">
            <div class="flex gap-3">
                <button onclick="hideFileNameModal()" class="flex-1 px-4 py-2.5 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition-colors font-medium">取消</button>
                <button onclick="confirmFileName()" class="flex-1 px-4 py-2.5 bg-primary text-white rounded-lg hover:bg-blue-600 transition-colors font-medium shadow-lg shadow-blue-500/30">确认导出</button>
            </div>
        </div>
    </div>

    <!-- 通用提示弹窗（替代alert） -->
    <div id="alertModal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center">
        <div class="bg-white rounded-2xl p-6 w-full max-w-md mx-4 shadow-2xl transform transition-all">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-10 h-10 bg-blue-100 text-primary rounded-full flex items-center justify-center">
                    <i class="fa fa-info text-lg"></i>
                </div>
                <h3 class="text-xl font-bold text-gray-800">提示</h3>
            </div>
            <p id="alertMessage" class="text-sm text-gray-600 mb-6 leading-relaxed"></p>
            <div class="flex justify-end">
                <button onclick="hideAlertModal()" class="px-6 py-2.5 bg-primary text-white rounded-lg hover:bg-blue-600 transition-colors font-medium shadow-lg shadow-blue-500/30">确定</button>
            </div>
        </div>
    </div>

    <!-- 通用确认弹窗（替代confirm） -->
    <div id="confirmModal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center">
        <div class="bg-white rounded-2xl p-6 w-full max-w-md mx-4 shadow-2xl transform transition-all">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-10 h-10 bg-red-100 text-danger rounded-full flex items-center justify-center">
                    <i class="fa fa-exclamation text-lg"></i>
                </div>
                <h3 class="text-xl font-bold text-gray-800">确认</h3>
            </div>
            <p id="confirmMessage" class="text-sm text-gray-600 mb-6 leading-relaxed"></p>
            <div class="flex gap-3">
                <button onclick="handleConfirmCancel()" class="flex-1 px-4 py-2.5 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition-colors font-medium">取消</button>
                <button onclick="handleConfirmOk()" class="flex-1 px-4 py-2.5 bg-danger text-white rounded-lg hover:bg-red-600 transition-colors font-medium shadow-lg shadow-red-500/30">确认</button>
            </div>
        </div>
    </div>

    <!-- 页面预览模态框 -->
    <div id="previewModal" class="fixed inset-0 bg-black/90 z-50 hidden flex items-center justify-center select-none">
        <div class="relative w-[95vw] h-[95vh] flex items-center justify-center">
            <!-- 关闭按钮 -->
            <button onclick="closePreviewModal()" class="absolute top-6 right-6 w-12 h-12 bg-white/10 hover:bg-white/20 text-white rounded-full flex items-center justify-center transition-colors z-20">
                <i class="fa fa-times text-xl"></i>
            </button>
            
            <!-- 图片容器 -->
            <div id="previewWrapper" class="preview-wrapper w-full h-full flex items-center justify-center overflow-hidden relative">
                <!-- 顶部文件名 -->
                <div class="absolute top-6 left-1/2 transform -translate-x-1/2 z-20 pointer-events-none">
                    <div class="bg-black/70 backdrop-blur-sm text-white px-4 py-2 rounded-full shadow-lg">
                        <span id="previewFileNameTop" class="text-sm font-medium text-white/90 max-w-[300px] truncate block"></span>
                    </div>
                </div>
                
                <img id="previewImage" src="" alt="页面预览" class="max-w-full max-h-full object-contain rounded-lg shadow-2xl select-none" style="transition: transform 0.2s ease; transform-origin: center center;">
                
                <!-- 左右切换按钮 -->
                <div class="absolute inset-y-0 left-0 right-0 flex items-center justify-between px-8 pointer-events-none">
                    <button onclick="showPrevPreview()" id="prevPreviewBtn" class="w-14 h-14 bg-black/40 hover:bg-black/60 text-white rounded-full flex items-center justify-center transition-all pointer-events-auto disabled:opacity-30 disabled:cursor-not-allowed transform hover:scale-110">
                        <i class="fa fa-chevron-left text-2xl"></i>
                    </button>
                    <button onclick="showNextPreview()" id="nextPreviewBtn" class="w-14 h-14 bg-black/40 hover:bg-black/60 text-white rounded-full flex items-center justify-center transition-all pointer-events-auto disabled:opacity-30 disabled:cursor-not-allowed transform hover:scale-110">
                        <i class="fa fa-chevron-right text-2xl"></i>
                    </button>
                </div>
                
                <!-- 底部信息栏 -->
                <div class="absolute bottom-6 left-1/2 transform -translate-x-1/2 bg-black/70 backdrop-blur-sm text-white px-6 py-3 rounded-full flex items-center gap-4 shadow-lg">
                    <span id="previewInfo" class="text-sm font-medium">第 1 页 / 共 1 页</span>
                    <span class="w-px h-4 bg-white/30"></span>
                    <span id="previewZoom" class="text-sm">70%</span>
                    <span class="w-px h-4 bg-white/30"></span>
                    <!-- 旋转按钮 -->
                    <button onclick="rotateCurrentPage()" class="flex items-center gap-1.5 hover:text-blue-300 transition-colors pointer-events-auto" title="顺时针旋转90度">
                        <i class="fa fa-rotate-right"></i>
                        <span class="text-xs">旋转</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局状态
        let allPages = [];
        let currentMode = 'merge'; // 修改为默认自由合并模式
        let fileIdCounter = 0;
        let pendingMergeBytes = null;
        let pendingMergeZip = null; // 存储待导出的ZIP数据
        let pendingMergeSingleImage = null; // 存储单张图片导出数据
        let currentPreviewIndex = 0;
        let currentScale = 0.7;
        let isDragging = false;
        let lastMouseX = 0;
        let lastMouseY = 0;
        let imageOffsetX = 0;
        let imageOffsetY = 0;
        let sortableInstance = null; // SortableJS 实例
        
        // 缩略图大小调整
        let thumbnailScale = 1;
        const minThumbnailScale = 0.3;
        const maxThumbnailScale = 3;
        const thumbnailScaleStep = 0.15;

        // 确认弹窗回调
        let confirmCallback = null;

        const fileInput = document.getElementById('fileInput');
        const previewGrid = document.getElementById('previewGrid');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const fileNameModal = document.getElementById('fileNameModal');
        const fileNameInput = document.getElementById('fileNameInput');
        const fileNameModalDesc = document.getElementById('fileNameModalDesc');
        const previewModal = document.getElementById('previewModal');
        const previewImage = document.getElementById('previewImage');
        const previewWrapper = document.getElementById('previewWrapper');
        const clearAllBtn = document.getElementById('clearAllBtn');
        const uploadBtnText = document.getElementById('uploadBtnText');
        const dragHint = document.getElementById('dragHint');

        // 事件监听
        fileInput.addEventListener('change', handleFileSelect);

        // 预览模态框事件
        document.addEventListener('keydown', handleKeydown);
        previewWrapper.addEventListener('wheel', handleWheel, { passive: false });
        previewWrapper.addEventListener('mousedown', handleMouseDown);
        document.addEventListener('mousemove', handleMouseMove);
        document.addEventListener('mouseup', handleMouseUp);
        
        // 点击背景关闭预览
        previewModal.addEventListener('click', (e) => {
            if (e.target === previewModal) closePreviewModal();
        });

        // 页面加载时检查是否首次访问，自动显示提示框
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化缩略图大小
            updateThumbnailSizeDisplay();
            applyThumbnailScale();
            
            // 初始化模式为自由合并
            setMode('merge');
            
            const tooltipShownKey = 'privacyTooltipShown';
            const hasShownTooltip = localStorage.getItem(tooltipShownKey);
            
            if (!hasShownTooltip) {
                // 首次访问，自动显示提示框，并添加光效
                const tooltip = document.getElementById('privacy-tooltip');
                showPrivacyTooltip();
                tooltip.classList.add('first-show-glow');
                
                // 标记已显示
                localStorage.setItem(tooltipShownKey, 'true');
                
                // 3秒后自动隐藏
                setTimeout(() => {
                    hidePrivacyTooltip();
                }, 10000);
            }
        });

        // 显示隐私提示
        function showPrivacyTooltip() {
            const tooltip = document.getElementById('privacy-tooltip');
            tooltip.classList.remove('hidden');
        }

        // 隐藏隐私提示
        function hidePrivacyTooltip() {
            const tooltip = document.getElementById('privacy-tooltip');
            tooltip.classList.add('hidden');
            tooltip.classList.remove('first-show-glow'); // 移除光效，确保后续不再显示
        }

        // Toast 提示函数（页面中上方，位置已上调）
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'fixed top-16 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-lg z-50 animate-fade-in-down text-sm font-medium';
            toast.innerHTML = `<i class="fa fa-check-circle mr-2 text-green-400"></i>${message}`;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }

        // 提示弹窗函数
        function showAlert(message) {
            document.getElementById('alertMessage').textContent = message;
            document.getElementById('alertModal').classList.remove('hidden');
        }

        function hideAlertModal() {
            document.getElementById('alertModal').classList.add('hidden');
        }

        // 确认弹窗函数
        function showConfirm(message, callback) {
            confirmCallback = callback;
            document.getElementById('confirmMessage').textContent = message;
            document.getElementById('confirmModal').classList.remove('hidden');
        }

        function handleConfirmOk() {
            document.getElementById('confirmModal').classList.add('hidden');
            if (confirmCallback) confirmCallback(true);
            confirmCallback = null;
        }

        function handleConfirmCancel() {
            document.getElementById('confirmModal').classList.add('hidden');
            if (confirmCallback) confirmCallback(false);
            confirmCallback = null;
        }

        function handleFileSelect(e) {
            const files = Array.from(e.target.files).filter(f => {
                const validTypes = ['application/pdf', 'image/png', 'image/jpeg', 'image/jpg', 'image/webp', 'image/gif'];
                return validTypes.includes(f.type) || f.name.match(/\.(pdf|png|jpg|jpeg|webp|gif)$/i);
            });
            if (files.length > 0) processFiles(files);
            fileInput.value = '';
        }

        // 更新上传按钮文字
        function updateUploadButtonText() {
            if (allPages.length > 0) {
                uploadBtnText.textContent = '追加文件';
            } else {
                uploadBtnText.textContent = '上传文件';
            }
        }

        // 一键清空所有文件（已移除二次确认）
        function clearAllFiles() {
            if (allPages.length === 0) return;
            
            allPages = [];
            fileIdCounter = 0;
            updateStats();
            renderGrid();
            updateClearButtonVisibility();
            updateUploadButtonText();
            showToast('所有文件已清空');
        }

        // 更新清空按钮显示状态
        function updateClearButtonVisibility() {
            if (allPages.length > 0) {
                clearAllBtn.classList.remove('hidden');
            } else {
                clearAllBtn.classList.add('hidden');
            }
        }

        // 更新拖拽提示显示
        function updateDragHintVisibility() {
            if (allPages.length > 0) {
                dragHint.classList.remove('hidden');
            } else {
                dragHint.classList.add('hidden');
            }
        }

        function showLoading(show) {
            loadingOverlay.style.display = show ? 'flex' : 'none';
        }

        async function processFiles(files) {
            // 记录处理前的页面数量，用于判断是首次导入还是追加
            const initialPageCount = allPages.length;
            
            try {
                for (const file of files) {
                    const fileType = file.type;
                    const baseName = file.name.replace(/\.[^/.]+$/, '');
                    
                    if (fileType === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf')) {
                        // 处理 PDF 文件
                        const arrayBuffer = await file.arrayBuffer();
                        const pdfDoc = await pdfjsLib.getDocument(arrayBuffer).promise;

                        for (let i = 1; i <= pdfDoc.numPages; i++) {
                            const page = await pdfDoc.getPage(i);
                            // 提高渲染清晰度，将 scale 从 0.5 提高到 1.5
                            const viewport = page.getViewport({ scale: 1.5 });
                            
                            const canvas = document.createElement('canvas');
                            canvas.height = viewport.height;
                            canvas.width = viewport.width;
                            
                            const context = canvas.getContext('2d');
                            // 设置图像平滑质量
                            context.imageSmoothingEnabled = true;
                            context.imageSmoothingQuality = 'high';
                            
                            await page.render({ 
                                canvasContext: context, 
                                viewport: viewport,
                                intent: 'display'
                            }).promise;
                            
                            const pageId = `page-${fileIdCounter++}-${i}`;
                            
                            allPages.push({
                                id: pageId,
                                originalFile: file,
                                originalFileName: baseName,
                                pageIndex: i,
                                totalInFile: pdfDoc.numPages,
                                thumbnailCanvas: canvas,
                                nameInput: `${baseName}_第${i}页`,
                                selected: false,
                                rotation: 0, // 初始化旋转角度
                                isImage: false,
                                pdfBytes: arrayBuffer // 保存 PDF 数据用于导出
                            });
                        }
                    } else if (fileType.startsWith('image/') || file.name.match(/\.(png|jpg|jpeg|webp|gif)$/i)) {
                        // 处理图片文件
                        const imageBitmap = await createImageBitmap(file);
                        
                        // 创建高分辨率缩略图
                        const canvas = document.createElement('canvas');
                        const maxDimension = 2000; // 最大尺寸限制
                        let width = imageBitmap.width;
                        let height = imageBitmap.height;
                        
                        // 等比例缩放，避免过大
                        if (width > maxDimension || height > maxDimension) {
                            const ratio = Math.min(maxDimension / width, maxDimension / height);
                            width = width * ratio;
                            height = height * ratio;
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.imageSmoothingEnabled = true;
                        ctx.imageSmoothingQuality = 'high';
                        ctx.drawImage(imageBitmap, 0, 0, width, height);
                        
                        const pageId = `page-${fileIdCounter++}-1`;
                        
                        allPages.push({
                            id: pageId,
                            originalFile: file,
                            originalFileName: baseName,
                            pageIndex: 1,
                            totalInFile: 1,
                            thumbnailCanvas: canvas,
                            nameInput: baseName,
                            selected: false,
                            rotation: 0,
                            isImage: true,
                            imageBlob: file // 保存原始图片文件
                        });
                        
                        // 释放资源
                        imageBitmap.close();
                    }
                }
                updateStats();
                renderGrid();
                updateClearButtonVisibility();
                updateUploadButtonText();
                updateDragHintVisibility();
                
                // 根据初始页面数判断显示哪种提示
                if (initialPageCount === 0) {
                    showToast('页面导入成功');
                } else {
                    showToast('文件追加成功');
                }

            } catch (error) {
                console.error("处理文件失败:", error);
                showAlert("解析文件失败，请确保文件未损坏。");
            }
        }

        function updateStats() {
            document.getElementById('pageCountDisplay').textContent = `共 ${allPages.length} 页`;
        }
        
        // 调整缩略图大小
        function adjustThumbnailSize(direction) {
            const newScale = thumbnailScale + (direction * thumbnailScaleStep);
            if (newScale >= minThumbnailScale && newScale <= maxThumbnailScale) {
                thumbnailScale = newScale;
                updateThumbnailSizeDisplay();
                applyThumbnailScale();
            }
        }
        
        // 更新缩略图大小显示
        function updateThumbnailSizeDisplay() {
            const display = document.getElementById('thumbnailSizeDisplay');
            if (display) {
                display.textContent = Math.round(thumbnailScale * 100) + '%';
            }
        }
        
        // 应用缩略图缩放
        function applyThumbnailScale() {
            document.documentElement.style.setProperty('--thumbnail-scale', thumbnailScale);
        }

        // 初始化拖拽排序
        function initSortable() {
            // 销毁之前的实例（如果存在）
            if (sortableInstance) {
                sortableInstance.destroy();
            }
            
            // 创建新的 Sortable 实例
            sortableInstance = new Sortable(previewGrid, {
                animation: 200,
                ghostClass: 'sortable-ghost',
                dragClass: 'sortable-drag',
                delay: 0,
                delayOnTouchOnly: true,
                touchStartThreshold: 5,
                onEnd: function(evt) {
                    // 拖拽结束时，同步更新 allPages 数组
                    const itemEl = evt.item;
                    const newIndex = evt.newIndex;
                    const oldIndex = evt.oldIndex;
                    
                    if (newIndex !== oldIndex) {
                        // 从旧位置移除元素
                        const movedItem = allPages.splice(oldIndex, 1)[0];
                        // 插入到新位置
                        allPages.splice(newIndex, 0, movedItem);
                        
                        // 更新当前预览索引（如果在预览中）
                        if (currentPreviewIndex === oldIndex) {
                            currentPreviewIndex = newIndex;
                        } else if (oldIndex < currentPreviewIndex && newIndex >= currentPreviewIndex) {
                            currentPreviewIndex--;
                        } else if (oldIndex > currentPreviewIndex && newIndex <= currentPreviewIndex) {
                            currentPreviewIndex++;
                        }
                        
                        showToast('页面顺序已调整');
                    }
                }
            });
        }

        function setMode(mode) {
            currentMode = mode;
            
            // 更新按钮样式
            const splitBtn = document.getElementById('mode-split');
            const mergeBtn = document.getElementById('mode-merge');
            
            if (mode === 'split') {
                splitBtn.className = 'mode-btn active px-4 py-2 rounded-md text-sm font-medium transition-all bg-white text-primary shadow-sm';
                mergeBtn.className = 'mode-btn px-4 py-2 rounded-md text-sm font-medium transition-all text-gray-500 hover:text-gray-700';
                document.getElementById('splitControls').classList.remove('hidden');
                document.getElementById('splitControls').classList.add('flex');
                document.getElementById('mergeControls').classList.add('hidden');
                document.getElementById('mergeControls').classList.remove('flex');
                allPages.forEach(p => p.selected = false);
            } else {
                mergeBtn.className = 'mode-btn active px-4 py-2 rounded-md text-sm font-medium transition-all bg-white text-secondary shadow-sm';
                splitBtn.className = 'mode-btn px-4 py-2 rounded-md text-sm font-medium transition-all text-gray-500 hover:text-gray-700';
                document.getElementById('splitControls').classList.add('hidden');
                document.getElementById('splitControls').classList.remove('flex');
                document.getElementById('mergeControls').classList.remove('hidden');
                document.getElementById('mergeControls').classList.add('flex');
            }
            renderGrid();
        }

        function renderGrid() {
            previewGrid.innerHTML = '';
            
            if (allPages.length === 0) {
                previewGrid.innerHTML = `
                    <div class="col-span-full flex flex-col items-center justify-center py-16 text-gray-400">
                        <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mb-4">
                            <i class="fa fa-file-pdf-o text-3xl text-gray-300"></i>
                        </div>
                        <p class="text-base font-medium">暂无文件</p>
                        <p class="text-sm mt-1">请点击右上角上传文件开始处理</p>
                    </div>
                `;
                // 清空时销毁 Sortable 实例
                if (sortableInstance) {
                    sortableInstance.destroy();
                    sortableInstance = null;
                }
                updateStats();
                updateDragHintVisibility();
                return;
            }

            allPages.forEach((page, index) => {
                const card = document.createElement('div');
                card.className = `group relative bg-white rounded-xl overflow-hidden border-2 transition-all duration-200 ${page.selected ? 'border-primary shadow-lg shadow-blue-500/20' : 'border-gray-100 hover:border-gray-200'} page-thumbnail`;
                card.setAttribute('data-id', page.id);
                card.setAttribute('data-index', index);
                
                // 删除按钮（两个模式都显示，浮动显示）
                const deleteButtonHtml = `
                    <div class="absolute top-2 right-2 w-6 h-6 bg-danger hover:bg-red-600 text-white rounded-full flex items-center justify-center cursor-pointer z-20 opacity-0 group-hover:opacity-100 transition-all duration-200 shadow-md" onclick="event.stopPropagation(); deletePage(${index})" title="删除页面">
                        <i class="fa fa-times text-xs"></i>
                    </div>
                `;

                // 自由合并模式下的中心勾选按钮（位置上移，位于中心高度偏上）
                let centerSelectHtml = '';
                if (currentMode === 'merge') {
                    centerSelectHtml = `
                        <div class="absolute top-[40%] left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-10 pointer-events-auto">
                            <div class="w-8 h-8 rounded-full border-2 flex items-center justify-center cursor-pointer transition-all duration-200 ${page.selected ? 'bg-primary border-primary text-white shadow-lg scale-110' : 'bg-white/90 border-gray-300 text-transparent hover:border-primary hover:scale-105'}" onclick="event.stopPropagation(); toggleSelect(${index})">
                                <i class="fa fa-check text-xs"></i>
                            </div>
                        </div>
                    `;
                }

                // 拖拽手柄（仅在左上角显示，更隐蔽）
                const dragHandleHtml = `
                    <div class="absolute top-2 left-2 w-6 h-6 bg-gray-400/50 hover:bg-primary text-white rounded-full flex items-center justify-center cursor-grab z-20 opacity-0 group-hover:opacity-100 transition-all duration-200 shadow-md sortable-handle" title="拖拽排序">
                        <i class="fa fa-arrows text-xs"></i>
                    </div>
                `;

                // 获取旋转角度
                const rotation = page.rotation || 0;

                card.innerHTML = `
                    ${deleteButtonHtml}
                    ${dragHandleHtml}
                    ${centerSelectHtml}
                    <div class="aspect-[3/4] bg-gray-50 flex items-center justify-center overflow-hidden relative cursor-pointer" onclick="openPreviewModal(${index})">
                        <img src="${page.thumbnailCanvas.toDataURL()}" alt="Page ${page.pageIndex}" class="thumbnail-img w-full h-full object-cover" style="image-rendering: -webkit-optimize-contrast; image-rendering: crisp-edges; transform: rotate(${rotation}deg);">
                        <div class="absolute inset-0 bg-black/0 group-hover:bg-black/5 transition-colors"></div>
                    </div>
                    <div class="p-3 bg-white border-t border-gray-100">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-xs font-medium text-gray-500 truncate flex-1 mr-2" title="${page.originalFileName}">${page.originalFileName}</span>
                            <span class="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full">${page.isImage ? 'IMG' : `P${page.pageIndex}/${page.totalInFile}`}</span>
                        </div>
                        <input type="text" value="${page.nameInput}" 
                               onchange="updateName(${index}, this.value)"
                               class="w-full px-3 py-1.5 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary bg-gray-50 hover:bg-white transition-colors"
                               placeholder="输入文件名">
                    </div>
                `;
                previewGrid.appendChild(card);
            });
            
            // 初始化拖拽排序
            initSortable();
        }

        // 辅助函数：获取旋转后的 Canvas
        function getRotatedCanvas(sourceCanvas, rotation) {
            if (!rotation || rotation === 0) return sourceCanvas;
            
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            // 根据旋转角度调整画布尺寸
            if (rotation === 90 || rotation === 270) {
                canvas.width = sourceCanvas.height;
                canvas.height = sourceCanvas.width;
            } else {
                canvas.width = sourceCanvas.width;
                canvas.height = sourceCanvas.height;
            }
            
            // 移动画布中心点，旋转，绘制
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.rotate((rotation * Math.PI) / 180);
            ctx.drawImage(sourceCanvas, -sourceCanvas.width / 2, -sourceCanvas.height / 2);
            
            return canvas;
        }

        // 删除单个页面（两个模式下都可用）
        function deletePage(index) {
            if (index >= 0 && index < allPages.length) {
                removeFromList(allPages[index].id);
                showToast('页面已删除');
            }
        }

        function toggleSelect(index) {
            if (currentMode !== 'merge') return;
            allPages[index].selected = !allPages[index].selected;
            renderGrid();
        }

        function updateName(index, newName) {
            allPages[index].nameInput = newName;
        }

        // --- 预览功能 ---
        function openPreviewModal(index) {
            if (index < 0 || index >= allPages.length) return;
            currentPreviewIndex = index;
            currentScale = 0.7;
            imageOffsetX = 0;
            imageOffsetY = 0;
            
            const page = allPages[index];
            previewImage.src = page.thumbnailCanvas.toDataURL();
            
            // 设置顶部文件名
            document.getElementById('previewFileNameTop').textContent = `${page.originalFileName} - ${page.isImage ? '图片' : '第' + page.pageIndex + '页'}`;
            
            // 确保旋转状态初始化
            if (page.rotation === undefined) {
                page.rotation = 0;
            }
            
            updatePreviewTransform();
            
            previewModal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            updatePreviewControls();
        }

        function closePreviewModal() {
            previewModal.classList.add('hidden');
            document.body.style.overflow = '';
            currentPreviewIndex = -1;
        }

        function showPrevPreview() {
            if (currentPreviewIndex > 0) {
                currentPreviewIndex--;
                const page = allPages[currentPreviewIndex];
                previewImage.src = page.thumbnailCanvas.toDataURL();
                document.getElementById('previewFileNameTop').textContent = `${page.originalFileName} - ${page.isImage ? '图片' : '第' + page.pageIndex + '页'}`;
                currentScale = 0.7;
                imageOffsetX = 0;
                imageOffsetY = 0;
                updatePreviewTransform();
                updatePreviewControls();
            }
        }

        function showNextPreview() {
            if (currentPreviewIndex < allPages.length - 1) {
                currentPreviewIndex++;
                const page = allPages[currentPreviewIndex];
                previewImage.src = page.thumbnailCanvas.toDataURL();
                document.getElementById('previewFileNameTop').textContent = `${page.originalFileName} - ${page.isImage ? '图片' : '第' + page.pageIndex + '页'}`;
                currentScale = 0.7;
                imageOffsetX = 0;
                imageOffsetY = 0;
                updatePreviewTransform();
                updatePreviewControls();
            }
        }

        function updatePreviewControls() {
            document.getElementById('prevPreviewBtn').disabled = currentPreviewIndex <= 0;
            document.getElementById('nextPreviewBtn').disabled = currentPreviewIndex >= allPages.length - 1;
            document.getElementById('previewInfo').textContent = `第 ${currentPreviewIndex + 1} 页 / 共 ${allPages.length} 页`;
            document.getElementById('previewZoom').textContent = `${Math.round(currentScale * 100)}%`;
        }

        function updatePreviewTransform() {
            const page = allPages[currentPreviewIndex];
            const rotation = page && page.rotation ? page.rotation : 0;
            previewImage.style.transform = `scale(${currentScale}) translate(${imageOffsetX}px, ${imageOffsetY}px) rotate(${rotation}deg)`;
        }

        // 旋转当前页面（仅保存到预览模块，不自动导出）
        function rotateCurrentPage() {
            if (currentPreviewIndex < 0 || currentPreviewIndex >= allPages.length) return;
            
            const page = allPages[currentPreviewIndex];
            
            // 顺时针旋转90度
            page.rotation = ((page.rotation || 0) + 90) % 360;
            
            // 应用视觉旋转
            updatePreviewTransform();
            
            // 更新缩略图显示
            renderGrid();
            
            showToast(`已顺时针旋转至${page.rotation}度`);
        }

        function handleKeydown(e) {
            if (previewModal.classList.contains('hidden')) return;
            
            switch(e.key) {
                case 'ArrowLeft':
                    e.preventDefault();
                    showPrevPreview();
                    break;
                case 'ArrowRight':
                case ' ':
                    e.preventDefault();
                    showNextPreview();
                    break;
                case 'Escape':
                    e.preventDefault();
                    closePreviewModal();
                    break;
                case '+':
                case '=':
                    e.preventDefault();
                    zoomIn();
                    break;
                case '-':
                    e.preventDefault();
                    zoomOut();
                    break;
                case '0':
                    e.preventDefault();
                    resetZoom();
                    break;
            }
        }

        function handleWheel(e) {
            if (previewModal.classList.contains('hidden')) return;
            e.preventDefault();
            
            if (e.deltaY < 0) {
                zoomIn();
            } else {
                zoomOut();
            }
        }

        function zoomIn() {
            if (currentScale < 3) {
                currentScale = Math.min(currentScale + 0.1, 3);
                updatePreviewTransform();
                updatePreviewControls();
            }
        }

        function zoomOut() {
            if (currentScale > 0.5) {
                currentScale = Math.max(currentScale - 0.1, 0.5);
                updatePreviewTransform();
                updatePreviewControls();
            }
        }

        function resetZoom() {
            currentScale = 0.7;
            imageOffsetX = 0;
            imageOffsetY = 0;
            updatePreviewTransform();
            updatePreviewControls();
        }

        function handleMouseDown(e) {
            if (previewModal.classList.contains('hidden')) return;
            if (e.target !== previewImage) return;
            
            isDragging = true;
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
            previewWrapper.classList.add('dragging');
            e.preventDefault();
        }

        function handleMouseMove(e) {
            if (!isDragging) return;
            
            const deltaX = e.clientX - lastMouseX;
            const deltaY = e.clientY - lastMouseY;
            
            imageOffsetX += deltaX / currentScale;
            imageOffsetY += deltaY / currentScale;
            
            updatePreviewTransform();
            
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
        }

        function handleMouseUp() {
            isDragging = false;
            previewWrapper.classList.remove('dragging');
        }

        // --- 核心逻辑：分页导出 ---
        async function exportAllSplit() {
            if (allPages.length === 0) return;
            
            // 获取选中的导出格式
            const exportFormat = document.querySelector('input[name="exportFormat"]:checked').value;
            showLoading(true);

            try {
                const exportedPageIds = [];
                const zip = new JSZip();
                // 如果页面数为1且导出格式为图片，则不使用ZIP
                let useZip = false;
                
                // 如果导出为图片且页数大于1，使用 ZIP 打包
                if (exportFormat !== 'pdf' && allPages.length > 1) {
                    useZip = true;
                }

                for (const page of allPages) {
                    // 获取旋转后的 Canvas（如果有旋转）
                    const rotatedCanvas = getRotatedCanvas(page.thumbnailCanvas, page.rotation || 0);
                    
                    if (exportFormat === 'pdf') {
                        // PDF 导出逻辑
                        if (page.isImage) {
                            // 图片转 PDF，使用旋转后的图像
                            const newPdf = await PDFLib.PDFDocument.create();
                            const pngData = rotatedCanvas.toDataURL('image/png');
                            const embeddedImage = await newPdf.embedPng(pngData);
                            
                            const pdfPage = newPdf.addPage([embeddedImage.width, embeddedImage.height]);
                            pdfPage.drawImage(embeddedImage, {
                                x: 0,
                                y: 0,
                                width: embeddedImage.width,
                                height: embeddedImage.height,
                            });
                            
                            const pdfBytes = await newPdf.save();
                            if (useZip) {
                                zip.file(`${page.nameInput}.pdf`, pdfBytes);
                            } else {
                                downloadFile(pdfBytes, `${page.nameInput}.pdf`);
                            }
                        } else {
                            // PDF 页面导出，应用旋转
                            const arrayBuffer = await page.originalFile.arrayBuffer();
                            const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
                            const newPdf = await PDFLib.PDFDocument.create();
                            const [copiedPage] = await newPdf.copyPages(pdfDoc, [page.pageIndex - 1]);
                            
                            // 应用旋转
                            if (page.rotation) {
                                copiedPage.setRotation(PDFLib.degrees(page.rotation));
                            }
                            
                            newPdf.addPage(copiedPage);
                            
                            const pdfBytes = await newPdf.save();
                            if (useZip) {
                                zip.file(`${page.nameInput}.pdf`, pdfBytes);
                            } else {
                                downloadFile(pdfBytes, `${page.nameInput}.pdf`);
                            }
                        }
                    } else {
                        // 图片导出逻辑（PNG/JPG），使用旋转后的 Canvas
                        let imageData;
                        let mimeType = exportFormat === 'png' ? 'image/png' : 'image/jpeg';
                        let extension = exportFormat === 'png' ? 'png' : 'jpg';
                        
                        if (exportFormat === 'jpg') {
                            // JPG 需要白色背景
                            const tempCanvas = document.createElement('canvas');
                            tempCanvas.width = rotatedCanvas.width;
                            tempCanvas.height = rotatedCanvas.height;
                            const ctx = tempCanvas.getContext('2d');
                            ctx.fillStyle = '#FFFFFF';
                            ctx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
                            ctx.drawImage(rotatedCanvas, 0, 0);
                            imageData = tempCanvas.toDataURL(mimeType, 0.92);
                        } else {
                            imageData = rotatedCanvas.toDataURL(mimeType);
                        }
                        
                        // 转换为二进制
                        const base64Data = imageData.split(',')[1];
                        const binaryData = atob(base64Data);
                        const bytes = new Uint8Array(binaryData.length);
                        for (let i = 0; i < binaryData.length; i++) {
                            bytes[i] = binaryData.charCodeAt(i);
                        }
                        
                        if (useZip) {
                            zip.file(`${page.nameInput}.${extension}`, bytes);
                        } else {
                            // 单张图片直接下载
                            downloadFile(bytes, `${page.nameInput}.${extension}`);
                        }
                    }
                    
                    exportedPageIds.push(page.id);
                }
                
                // 如果使用 ZIP，下载 ZIP 文件
                if (useZip) {
                    const zipBlob = await zip.generateAsync({ type: 'blob' });
                    const zipUrl = URL.createObjectURL(zipBlob);
                    const link = document.createElement('a');
                    link.href = zipUrl;
                    link.download = `导出文件_${new Date().getTime()}.zip`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(zipUrl);
                }
                
                // 根据复选框状态决定是否删除
                if (document.getElementById('deleteAfterExportSplit').checked) {
                    exportedPageIds.forEach(id => removeFromList(id));
                }
                
                showToast(useZip ? '文件已打包导出' : '页面导出成功');
            } catch (e) {
                console.error(e);
                showAlert("导出过程中发生错误");
            } finally {
                showLoading(false);
            }
        }

        // --- 核心逻辑：自由导出 (合并) ---
        async function exportSelectedMerge() {
            const selectedPages = allPages.filter(p => p.selected);
            if (selectedPages.length === 0) {
                showAlert("请先选择要导出的页面");
                return;
            }
            
            // 获取选中的导出格式
            const exportFormat = document.querySelector('input[name="exportFormatMerge"]:checked').value;
            showLoading(true);

            try {
                if (exportFormat === 'pdf') {
                    // PDF 导出逻辑
                    const newPdf = await PDFLib.PDFDocument.create();
                    
                    for (const page of selectedPages) {
                        // 获取旋转后的 Canvas
                        const rotatedCanvas = getRotatedCanvas(page.thumbnailCanvas, page.rotation || 0);
                        
                        if (page.isImage) {
                            // 处理图片，使用旋转后的图像
                            const pngData = rotatedCanvas.toDataURL('image/png');
                            const embeddedImage = await newPdf.embedPng(pngData);
                            
                            const pdfPage = newPdf.addPage([embeddedImage.width, embeddedImage.height]);
                            pdfPage.drawImage(embeddedImage, {
                                x: 0,
                                y: 0,
                                width: embeddedImage.width,
                                height: embeddedImage.height,
                            });
                        } else {
                            // 处理 PDF 页面，应用旋转
                            const arrayBuffer = await page.originalFile.arrayBuffer();
                            const sourcePdf = await PDFLib.PDFDocument.load(arrayBuffer);
                            const [copiedPage] = await newPdf.copyPages(sourcePdf, [page.pageIndex - 1]);
                            
                            // 应用旋转
                            if (page.rotation) {
                                copiedPage.setRotation(PDFLib.degrees(page.rotation));
                            }
                            
                            newPdf.addPage(copiedPage);
                        }
                    }

                    const pdfBytes = await newPdf.save();
                    pendingMergeBytes = pdfBytes;
                    pendingMergeZip = null; // 清空ZIP数据
                    pendingMergeSingleImage = null; // 清空单张图片数据
                    
                    fileNameModalDesc.textContent = '请输入合并后的PDF文件名';
                    const defaultName = `合并PDF_${new Date().getTime()}`;
                    showFileNameModal(defaultName);
                } else {
                    // 图片导出逻辑（PNG/JPG）
                    const extension = exportFormat === 'png' ? 'png' : 'jpg';
                    const mimeType = exportFormat === 'png' ? 'image/png' : 'image/jpeg';
                    
                    // 如果只选择了一张页面，直接导出单张图片（不压缩）
                    if (selectedPages.length === 1) {
                        const page = selectedPages[0];
                        const rotatedCanvas = getRotatedCanvas(page.thumbnailCanvas, page.rotation || 0);
                        
                        let imageData;
                        if (exportFormat === 'jpg') {
                            // JPG 需要白色背景
                            const tempCanvas = document.createElement('canvas');
                            tempCanvas.width = rotatedCanvas.width;
                            tempCanvas.height = rotatedCanvas.height;
                            const ctx = tempCanvas.getContext('2d');
                            ctx.fillStyle = '#FFFFFF';
                            ctx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
                            ctx.drawImage(rotatedCanvas, 0, 0);
                            imageData = tempCanvas.toDataURL(mimeType, 0.92);
                        } else {
                            imageData = rotatedCanvas.toDataURL(mimeType);
                        }
                        
                        // 转换为二进制
                        const base64Data = imageData.split(',')[1];
                        const binaryData = atob(base64Data);
                        const bytes = new Uint8Array(binaryData.length);
                        for (let i = 0; i < binaryData.length; i++) {
                            bytes[i] = binaryData.charCodeAt(i);
                        }
                        
                        // 保存单张图片数据，弹出命名框
                        pendingMergeSingleImage = bytes;
                        pendingMergeBytes = null;
                        pendingMergeZip = null;
                        
                        fileNameModalDesc.textContent = `请输入图片文件名`;
                        const defaultName = `${page.nameInput}.${extension}`;
                        showFileNameModal(defaultName);
                    } else {
                        // 多张图片，打包为ZIP
                        const zip = new JSZip();
                        
                        for (const page of selectedPages) {
                            // 获取旋转后的 Canvas
                            const rotatedCanvas = getRotatedCanvas(page.thumbnailCanvas, page.rotation || 0);
                            
                            let imageData;
                            if (exportFormat === 'jpg') {
                                // JPG 需要白色背景
                                const tempCanvas = document.createElement('canvas');
                                tempCanvas.width = rotatedCanvas.width;
                                tempCanvas.height = rotatedCanvas.height;
                                const ctx = tempCanvas.getContext('2d');
                                ctx.fillStyle = '#FFFFFF';
                                ctx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
                                ctx.drawImage(rotatedCanvas, 0, 0);
                                imageData = tempCanvas.toDataURL(mimeType, 0.92);
                            } else {
                                imageData = rotatedCanvas.toDataURL(mimeType);
                            }
                            
                            // 转换为二进制
                            const base64Data = imageData.split(',')[1];
                            const binaryData = atob(base64Data);
                            const bytes = new Uint8Array(binaryData.length);
                            for (let i = 0; i < binaryData.length; i++) {
                                bytes[i] = binaryData.charCodeAt(i);
                            }
                            
                            zip.file(`${page.nameInput}.${extension}`, bytes);
                        }
                        
                        const zipBlob = await zip.generateAsync({ type: 'blob' });
                        pendingMergeZip = zipBlob;
                        pendingMergeBytes = null; // 清空PDF数据
                        pendingMergeSingleImage = null; // 清空单张图片数据
                        
                        fileNameModalDesc.textContent = `请输入打包后的文件名（将导出为ZIP格式）`;
                        const defaultName = `合并图片_${new Date().getTime()}`;
                        showFileNameModal(defaultName);
                    }
                }

            } catch (e) {
                console.error(e);
                showAlert("导出失败");
            } finally {
                showLoading(false);
            }
        }

        function showFileNameModal(defaultName) {
            fileNameInput.value = defaultName;
            fileNameModal.classList.remove('hidden');
            setTimeout(() => {
                fileNameInput.focus();
                fileNameInput.select();
            }, 100);
        }

        function hideFileNameModal() {
            fileNameModal.classList.add('hidden');
            pendingMergeBytes = null;
            pendingMergeZip = null;
            pendingMergeSingleImage = null;
        }

        function confirmFileName() {
            if (!pendingMergeBytes && !pendingMergeZip && !pendingMergeSingleImage) {
                hideFileNameModal();
                return;
            }
            
            let finalName = fileNameInput.value.trim();
            
            if (pendingMergeBytes) {
                // PDF 导出
                if (!finalName.toLowerCase().endsWith('.pdf')) {
                    finalName += '.pdf';
                }
                downloadFile(pendingMergeBytes, finalName);
            } else if (pendingMergeSingleImage) {
                // 单张图片导出
                const exportFormat = document.querySelector('input[name="exportFormatMerge"]:checked').value;
                const extension = exportFormat === 'png' ? 'png' : 'jpg';
                if (!finalName.toLowerCase().endsWith(`.${extension}`)) {
                    finalName += `.${extension}`;
                }
                downloadFile(pendingMergeSingleImage, finalName);
            } else if (pendingMergeZip) {
                // ZIP 导出（图片打包）
                if (!finalName.toLowerCase().endsWith('.zip')) {
                    finalName += '.zip';
                }
                const zipUrl = URL.createObjectURL(pendingMergeZip);
                const link = document.createElement('a');
                link.href = zipUrl;
                link.download = finalName;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(zipUrl);
            }
            
            // 根据复选框状态决定是否删除原页面
            const shouldDelete = document.getElementById('deleteAfterExport').checked;
            if (shouldDelete) {
                const selectedPages = allPages.filter(p => p.selected);
                selectedPages.forEach(p => removeFromList(p.id));
            } else {
                // 如果不删除，仅取消选中状态
                allPages.forEach(p => p.selected = false);
                renderGrid();
            }
            
            showToast('页面导出成功');
            hideFileNameModal();
        }

        function removeFromList(id) {
            allPages = allPages.filter(p => p.id !== id);
            renderGrid();
            updateStats();
            updateClearButtonVisibility();
            updateUploadButtonText();
            updateDragHintVisibility();
        }

        function downloadFile(data, filename) {
            const blob = new Blob([data], { type: 'application/octet-stream' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(link.href);
        }
    </script>
